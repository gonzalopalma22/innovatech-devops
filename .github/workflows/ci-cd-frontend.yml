name: CI/CD - Frontend

on:
  push:
    branches: [main]
    paths:
      - 'front-despacho/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: innovatech-frontend
  ECS_CLUSTER: innovatech-cluster
  ECS_SERVICE: frontend-service
  CONTAINER_NAME: frontend

jobs:
  build-and-deploy:
    name: Build, Push y Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen a ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          VITE_API_VENTAS: ${{ secrets.VITE_API_VENTAS }}
          VITE_API_DESPACHOS: ${{ secrets.VITE_API_DESPACHOS }}
        working-directory: front-despacho
        run: |
          docker build \
            --build-arg VITE_API_VENTAS=$VITE_API_VENTAS \
            --build-arg VITE_API_DESPACHOS=$VITE_API_DESPACHOS \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Descargar task definition actual
        run: |
          aws ecs describe-task-definition \
            --task-definition frontend-task \
            --query taskDefinition \
            > task-definition-frontend.json

      - name: Actualizar imagen en task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-frontend.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy en ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true